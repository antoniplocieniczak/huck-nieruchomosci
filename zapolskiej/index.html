<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zapolskiej Namysłów — osiedle bliźniaków premium</title>
  <meta name="description" content="Zapolskiej Namysłów. 16 bliźniaków z ogrodami w sercu Namysłowa. Oddanie III kw. 2027. Ceny od 649 000 zł." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#F4EFE9',
            ink: '#1A1A1A',
            forest: '#303C30',
            sage: '#B8C5AB',
            brown: '#4E4138',
            warm: '#564F3F',
            stone: '#C5BCAB',
            sand: '#DAD1BF',
            hairline: '#DAD1BF',
            muted: '#564F3F',
            amber: '#C5BCAB',
            sold: '#A8A29E',
          },
          fontFamily: {
            display: ['"Clash Display"', 'Georgia', 'sans-serif'],
            sans: ['Ubuntu', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          letterSpacing: {
            'extreme': '0.2em',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    html { scroll-behavior: smooth; }
    body {
      background: #F4EFE9;
      color: #1A1A1A;
      font-family: 'Ubuntu', system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .font-display { font-family: 'Clash Display', Georgia, sans-serif; font-weight: 600; letter-spacing: -0.015em; }
    .font-display-bold { font-family: 'Clash Display', Georgia, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
    /* Sage underline / accent word (Huck style) */
    .accent-sage { color: #B8C5AB; }
    /* Outline text effect */
    .text-outline {
      -webkit-text-stroke: 1.5px #303C30;
      color: transparent;
    }
    .mono-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      font-weight: 500;
    }
    .mono-data {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
    }
    .hairline { border-color: #E5DFD6; }

    /* Reveal animation */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1s var(--ease), transform 1s var(--ease);
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Custom scrollbar for panels */
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #E5DFD6; border-radius: 2px; }

    /* Hero parallax target */
    .hero-media { transform-origin: center; will-change: transform; }

    /* Huck photo gradient overlay */
    .huck-photo-grad::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(48,60,48,0) 0%, rgba(48,60,48,0.25) 55%, rgba(78,65,56,0.85) 100%);
      pointer-events: none;
    }

    /* Pulse for current timeline node */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(48,60,48,0.35); }
      70% { box-shadow: 0 0 0 14px rgba(48,60,48,0); }
      100% { box-shadow: 0 0 0 0 rgba(48,60,48,0); }
    }
    .pulse-ring { animation: pulse-ring 2.2s var(--ease) infinite; }

    /* Cursor hide on desktop hero when custom cursor active */
    .cursor-none, .cursor-none * { cursor: none !important; }

    /* Accordion */
    details[open] summary .chev { transform: rotate(45deg); }
    details summary::-webkit-details-marker { display: none; }

    /* Hide scrollbars on pill filter row */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* Plot segment hover */
    .plot-seg { transition: all 0.35s var(--ease); }
    .plot-seg:hover { filter: brightness(1.1); }

    /* Input focus */
    .field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.20);
      color: #F5F2ED;
      padding: 14px 16px;
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      transition: border-color 150ms ease, background-color 150ms ease, box-shadow 200ms ease;
    }
    .field::placeholder { color: rgba(245,242,237,0.60); }
    .field:focus {
      outline: none;
      border-color: rgba(255,255,255,0.40);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
    }

    /* Frosted glass card - używana w sekcji kontakt pod zdjęciem z overlay forest.
       Fallback dla przeglądarek bez backdrop-filter: mocniejsze ciemne tło. */
    .glass-card {
      background-color: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
    }
    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .glass-card {
        background-color: rgba(0,0,0,0.55);
      }
    }

    /* Slider */
    input[type="range"].calc-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 2px; background: #E5DFD6; outline: none;
    }
    input[type="range"].calc-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #2D3B2E; cursor: pointer;
      border: 3px solid #F5F2ED;
      box-shadow: 0 0 0 1px #2D3B2E;
    }
    input[type="range"].calc-slider::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #2D3B2E; cursor: pointer;
      border: 3px solid #F5F2ED;
    }

    /* Marquee for trust bar */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee { animation: marquee 40s linear infinite; }

    /* Scroll arrow bounce */
    @keyframes nudge {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(8px); opacity: 1; }
    }
    .nudge { animation: nudge 2s var(--ease) infinite; }
  </style>
